apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-operator-mcp
  namespace: flux-system
spec:
  interval: 60m
  url: oci://ghcr.io/controlplaneio-fluxcd/charts
  type: oci
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator-mcp
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: flux-operator-mcp
      version: "0.45.1"
      sourceRef:
        kind: HelmRepository
        name: flux-operator-mcp
        namespace: flux-system
  values:
    serviceAccount:
      create: false
      name: flux-operator-mcp
    transport: http
    readonly: true
    networkPolicy:
      ingress:
        namespaces: [ "kagent" ]
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: flux-operator-mcp
  namespace: kagent
spec:
  description: Flux Operator MCP Server
  protocol: STREAMABLE_HTTP
  url: http://flux-operator-mcp.flux-system.svc.cluster.local:9090/mcp
  sseReadTimeout: 5m0s
  terminateOnClose: true
  timeout: 30s
