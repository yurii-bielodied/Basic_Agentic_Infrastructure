apiVersion: v1
kind: Namespace
metadata:
  name: kagent
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    tag: "0.8.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 1h
  releaseName: kagent
  postRenderers:
  - kustomize:
      patches:
      - patch: |
          - op: add
            path: /metadata/labels/app.kubernetes.io~1version
            value: "0.8.0"
        target:
          labelSelector: app.kubernetes.io/name=kagent
  dependsOn:
  - name: kagent-crds
    namespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
    namespace: flux-system
  install:
    createNamespace: true
  values:
    controller:
      image:
        tag: 0.8.0
    tag: 0.8.0
    ui:
      image:
        tag: 0.8.0
    tools:
      querydoc:
        enabled: false
    agents:
      argo-rollouts-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-policy-agent:
        enabled: false
      helm-agent:
        enabled: true
      istio-agent:
        enabled: false
      kgateway-agent:
        enabled: false
      observability-agent:
        enabled: true
      promql-agent:
        enabled: false
    providers:
      # default: openAI
      # openAI:
      #   apiKey: OPENAI_API_KEY
      default: ollama
      ollama:
        provider: "Ollama"
        model: "qwen3:14b"
        config:
          host: "http://host.docker.internal:11434"
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: kagent
  namespace: kagent
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: kagent
  to:
  - group: ""
    kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent
  namespace: kagent
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: kagent-controller
      namespace: kagent
      port: 8083
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kagent-ui
      namespace: kagent
      port: 8080
