apiVersion: v1
kind: Namespace
metadata:
  name: phoenix
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: phoenix
  namespace: flux-system
spec:
  interval: 30m
  url: oci://registry-1.docker.io/arizephoenix/phoenix-helm
  ref:
    tag: "5.0.18"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: phoenix
spec:
  interval: 30m
  releaseName: phoenix
  chartRef:
    kind: OCIRepository
    name: phoenix
    namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    ingress:
      enabled: false

    service:
      type: ClusterIP

    postgresql:
      enabled: true

    persistence:
      enabled: false

    auth:
      enableAuth: true
      defaultAdminPassword: "Phoenix2026!" # Will request change on first login
      useSecureCookies: false

    healthChecks:
      startupProbe:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 2
        failureThreshold: 90
        timeoutSeconds: 1

    logging:
      level: info
      dbLevel: warning
