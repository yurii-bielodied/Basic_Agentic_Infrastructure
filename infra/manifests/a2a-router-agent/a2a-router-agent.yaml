apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-router-agent
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-router-agent
  template:
    metadata:
      labels:
        app: a2a-router-agent
    spec:
      containers:
      - name: router
        image: ghcr.io/yurii-bielodied/a2a-router-agent:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: PUBLIC_BASE_URL
          value: "http://a2a-router-agent.kagent.svc.cluster.local:8080"
        - name: KAGENT_REMOTE_AGENT_BASE
          value: "http://kagent-controller.kagent.svc.cluster.local:8083/api/a2a/kagent/k8s-agent"
        - name: HTTP_TIMEOUT_SECONDS
          value: "30"
        - name: DEFAULT_NAMESPACE
          value: "default"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
