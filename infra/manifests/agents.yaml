apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agents
  namespace: flux-system
spec:

  dependsOn:
  - name: kagent
    namespace: kagent

  interval: 5m
  path: ./infra/manifests/a2a-router-agent
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
