apiVersion: v1
kind: Namespace
metadata:
  name: mcp-governance
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mcp-governance
  namespace: mcp-governance
spec:
  interval: 30m
  url: oci://ghcr.io/techwithhuz/charts/mcp-governance
  ref:
    tag: "0.20.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: mcp-governance
spec:
  interval: 30m
  releaseName: mcp-governance

  chartRef:
    kind: OCIRepository
    name: mcp-governance
    namespace: mcp-governance

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    cleanupOnFail: true

  values:
    createNamespace: true

    controller:
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-controller
        tag: "0.20.2"
        pullPolicy: Always
      service:
        type: ClusterIP
        nodePort: null

    dashboard:
      enabled: true
      replicas: 1
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-dashboard
        tag: "0.20.2"
        pullPolicy: Always
      service:
        type: ClusterIP
        nodePort: null
      apiUrl: ""
    crds:
      installExternal: false
    samples:
      install: true
