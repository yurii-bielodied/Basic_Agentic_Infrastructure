apiVersion: v1
kind: Namespace
metadata:
  name: agentgateway-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kgateway-dev/charts/agentgateway
  ref:
    tag: "v2.2.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  interval: 1h
  releaseName: agentgateway
  dependsOn:
  - name: agentgateway-crds
    namespace: agentgateway-system
  chartRef:
    kind: OCIRepository
    name: agentgateway
    namespace: flux-system
  install:
    createNamespace: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-external
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
