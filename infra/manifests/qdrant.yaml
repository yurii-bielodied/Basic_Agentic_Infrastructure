apiVersion: v1
kind: Namespace
metadata:
  name: qdrant
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: qdrant
  namespace: flux-system
spec:
  interval: 1h
  url: https://qdrant.github.io/qdrant-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: qdrant
spec:
  interval: 1h
  releaseName: qdrant
  chart:
    spec:
      chart: qdrant
      version: "1.17.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
      interval: 1h

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  driftDetection:
    mode: enabled

  values:
    replicaCount: 1

    ingress:
      enabled: false

    service:
      type: ClusterIP

    persistence:
      size: 10Gi

    snapshotPersistence:
      enabled: false

    # For a local single-node scenario
    config:
      cluster:
        enabled: false
